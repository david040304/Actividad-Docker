# ── Orquestación de servicios ──────────────────────────
# Uso:
#   docker-compose up --build        (primera vez / tras cambios)
#   docker-compose up -d             (modo background)
#   docker-compose down -v           (parar y borrar volúmenes)

services:

  # ─── Base de datos PostgreSQL ─────────────────────────
  database:
    image: postgres:16-alpine
    container_name: agenda-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agenda_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend Flask (API) ──────────────────────────────
  backend:
    build: ./backend
    container_name: agenda-backend
    restart: unless-stopped
    environment:
      FLASK_DEBUG: "0"
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: agenda_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy

  # ─── Frontend Nginx ───────────────────────────────────
  frontend:
    build: ./frontend
    container_name: agenda-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
